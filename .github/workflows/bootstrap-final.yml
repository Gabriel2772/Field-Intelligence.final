name: Bootstrap validated final source

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  SOURCE_ARCHIVE_URL: "https://sdmntprbrazilsouth.oaiusercontent.com/files/00000000-c9c4-720e-9ad7-a1109dcc202c/raw?se=2026-07-11T20:01:57Z&sp=r&sv=2026-02-06&sr=b&scid=b6b82fb0-89a5-524b-97d2-41b03bc05a5e&skoid=a6356955-0ca0-4033-9150-c0c162458498&sktid=a48cca56-e6da-484e-a814-9c849652bcb3&skt=2026-07-11T13:56:06Z&ske=2026-07-13T13:56:06Z&sks=b&skv=2026-02-06&sig=gQfVFy36gvx9fUNfaTypEIKdwfp/S9E0FiNZVPGLy9g%3D"

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download validated source artifact
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 --retry-delay 2 "$SOURCE_ARCHIVE_URL" --output validated-artifact.zip
          mkdir -p artifact source
          unzip -q validated-artifact.zip -d artifact
          unzip -q artifact/field-intelligence-source.zip -d source
          test -f source/package.json
          test -f source/.replit
          test -f source/artifacts/tequaly/src/pages/login.tsx

      - name: Replace bootstrap with validated project
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name source -exec rm -rf {} +
          cp -a source/. .
          rm -rf source

      - name: Commit complete final repository
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Import validated Tequaly visual 2.1 source [skip ci]"
          git push origin HEAD:main
