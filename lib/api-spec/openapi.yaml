                $ref: "#/components/schemas/Frente"

  /frentes/{id}:
    patch:
      operationId: updateFrente
      tags: [frentes]
      summary: Update work front
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FrenteUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Frente"
    delete:
      operationId: deleteFrente
