          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitaGps"

  # ─── Visita ↔ Ativos (QR) ────────────────────────────────
  /visitas/{visitaId}/ativos:
    get:
      operationId: listVisitaAtivos
      tags: [visitas]
