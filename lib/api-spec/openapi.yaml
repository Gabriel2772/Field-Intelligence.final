  /visitas/{visitaId}/checklist/apply-template:
    post:
      operationId: applyChecklistTemplate
      tags: [checklist]
      summary: Instantiate a template's items as pending checklist items on a visit
      parameters:
        - name: visitaId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyChecklistTemplateInput"
      responses:
        "201":
          description: Created items
          content:
            application/json:
              schema:
                type: array
