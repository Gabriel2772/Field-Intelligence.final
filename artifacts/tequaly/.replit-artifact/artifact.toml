kind = "web"
previewPath = "/"
title = "TEQUALY Field Intelligence"
version = "1.0.0"
id = "artifacts/tequaly"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24823

[services.development]
run = "pnpm --filter @workspace/tequaly run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tequaly", "run", "build" ]
serve = "static"
publicDir = "artifacts/tequaly/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24823"
BASE_PATH = "/"
